<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cable - EV Charging Station</title>
    <meta name="description" content="Cable EV Charging - Shared Content" />
    <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔌</text></svg>"
    />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #5082C8 0%, #3D6AA0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .status {
            font-size: 1rem;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border-left: 4px solid #87A8D9;
        }

        .error {
            border-left-color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .success {
            border-left-color: #87A8D9;
            background: rgba(135, 168, 217, 0.1);
        }

        .warning {
            border-left-color: #f39c12;
            background: rgba(243, 156, 18, 0.1);
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            margin: 10px 5px;
            font-weight: 600;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #5082C8;
            border-color: #5082C8;
        }

        .btn-secondary {
            background: #87A8D9;
            border-color: #87A8D9;
        }

        .link-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .link-info h3 {
            margin-bottom: 10px;
            color: #fff;
        }

        .link-info p {
            margin: 5px 0;
            opacity: 0.9;
        }

        .footer {
            margin-top: 30px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* Arabic/RTL Support */
        .rtl {
            direction: rtl;
            text-align: right;
        }

        .rtl .container {
            text-align: center; /* Keep centered for main content */
        }

        .rtl .link-info {
            text-align: right;
        }

        .rtl .countdown-text,
        .rtl .status,
        .rtl .subtitle {
            text-align: center;
        }

        /* Arabic font improvements */
        .arabic {
            font-family: "Segoe UI", "Tahoma", "Arial", "Helvetica Neue", sans-serif;
            line-height: 1.6;
        }

        .arabic h1 {
            font-weight: 600;
        }

        .arabic .link-info h3 {
            font-weight: 600;
        }

        /* Language toggle button */
        .language-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .language-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .logo {
                font-size: 3rem;
            }

            .language-toggle {
                top: 10px;
                right: 10px;
                font-size: 0.8rem;
                padding: 6px 10px;
            }
        }

        /* Dark mode detection */
        @media (prefers-color-scheme: dark) {
            .container {
                background: rgba(61, 106, 160, 0.2);
            }
        }

        /* Countdown Timer Styles */
        .countdown-container {
            margin: 30px 0;
            display: none;
        }

        .countdown-circle {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .countdown-circle svg {
            transform: rotate(-90deg);
            width: 120px;
            height: 120px;
        }

        .countdown-circle .background {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 8;
        }

        .countdown-circle .progress {
            fill: none;
            stroke: #87A8D9;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 314;
            stroke-dashoffset: 314;
            transition: stroke-dashoffset 1s linear;
        }

        .countdown-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            color: #87A8D9;
            text-shadow: 0 0 10px rgba(135, 168, 217, 0.5);
        }

        .countdown-text {
            font-size: 1.2rem;
            margin-bottom: 15px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            }
            to {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            }
        }

        .redirect-icon {
            font-size: 2rem;
            animation: bounce 2s infinite;
            margin-bottom: 10px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .cancel-redirect {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .cancel-redirect:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        /* Hide elements initially */
        .hide {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Enhanced button styling */
        .manual-buttons {
            animation: slideUp 0.5s ease-out;
            margin-top: 20px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<button class="language-toggle" onclick="toggleLanguage()" id="langToggle">عربي</button>

<div class="container">
    <div class="logo">🔌</div>
    <h1 data-en="Cable EV" data-ar="كيبل للمركبات الكهربائية">Cable EV</h1>
    <div class="subtitle" data-en="Electric Vehicle Charging Network" data-ar="شبكة شحن المركبات الكهربائية">Electric Vehicle Charging Network</div>

    <!-- Countdown Timer for Auto-Redirect -->
    <div id="countdownContainer" class="countdown-container">
        <div class="redirect-icon">🚀</div>
        <div class="countdown-text" 
             data-en="Redirecting to Cable app in..." 
             data-ar="جاري التوجيه إلى تطبيق كيبل خلال...">Redirecting to Cable app in...</div>
        <div class="countdown-circle">
            <svg viewBox="0 0 100 100">
                <circle class="background" cx="50" cy="50" r="45"></circle>
                <circle class="progress" cx="50" cy="50" r="45" id="progressCircle"></circle>
            </svg>
            <div class="countdown-number" id="countdownNumber">3</div>
        </div>
    </div>

    <div class="loader" id="loader"></div>
    <div class="status" id="status" 
         data-en="Validating shared link..." 
         data-ar="جاري التحقق من الرابط المشارك...">Validating shared link...</div>

    <!-- Manual Action Buttons (Hidden by default) -->
    <div id="actionButtons" class="manual-buttons hide">
        <button class="btn btn-primary" onclick="openApp()" 
                data-en="Open Cable App" 
                data-ar="فتح تطبيق كيبل">
            Open Cable App
        </button>
        <button class="btn btn-secondary" onclick="downloadApp()" 
                data-en="Download App" 
                data-ar="تحميل التطبيق">
            Download App
        </button>
    </div>

    <div class="footer" 
         data-en="Secure sharing powered by Cable" 
         data-ar="مشاركة آمنة مدعومة من كيبل">Secure sharing powered by Cable</div>
</div>

<script>
    // Configuration - Update these URLs for your production environment
    const CONFIG = {
        API_BASE_URL: window.location.origin, // Use same domain as your API
        ANDROID_PACKAGE: "com.cable.projectx", // Update with your Android package name
        IOS_APP_ID: "6480162073", // Update with your iOS App Store ID
        WEB_FALLBACK: window.location.origin + "/web", // Update with your web app URL
    };

    // Global variables
    let linkData = null;
    let deviceInfo = {};
    let countdownTimer = null;
    let redirectCancelled = false;
    let currentLanguage = 'ar'; // Default to Arabic

    // Device detection
    const isAndroid = /Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isMobile = isAndroid || isIOS;

    // Get device info
    function getDeviceInfo() {
        return {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screenWidth: screen.width,
            screenHeight: screen.height,
            timestamp: new Date().toISOString(),
        };
    }

    // Get IP address (simplified - you might want to use a service)
    async function getIpAddress() {
        try {
            const response = await fetch("https://api.ipify.org?format=json");
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.warn("Could not get IP address:", error);
            return null;
        }
    }

    // Language and Translation Functions
    const translations = {
        en: {
            validatingLink: "Validating shared link...",
            loadingContent: "Loading shared content...",
            linkValidated: "Link validated successfully!",
            readyToOpen: "Ready to open!",
            openingApp: "Opening Cable app...",
            redirectingStore: "Redirecting to app store...",
            clickToContinue: "Click 'Open Cable App' to continue",
            chooseContinue: "Choose how you'd like to continue",
            linkDeactivated: "This shared link has been deactivated.",
            linkExpired: "This shared link has expired.",
            usageLimitReached: "This shared link has reached its usage limit.",
            linkNotFound: "This shared link was not found or has expired.",
            unableToLoad: "Unable to load shared content. Please try again.",
            unableToValidate: "Unable to validate link",
            linkValidationFailed: "Link validation failed",
            unableToOpen: "Unable to open app. Try downloading it first.",
            didntOpenRedirect: "If the app didn't open, we'll redirect you to download it...",
            couldntOpenInstall: "Couldn't open the app. Let's get it installed!",
            welcomeBack: "Welcome back! Try opening the app again.",
            chargingStation: "🔌 Charging Station",
            userProfile: "👤 User Profile",
            specialOffer: "🎁 Special Offer",
            routePlan: "🗺️ Route Plan",
            sharedContent: "📱 Shared Content",
            defaultDescription: 'Tap "Open Cable App" to view this content.'
        },
        ar: {
            validatingLink: "جاري التحقق من الرابط المشارك...",
            loadingContent: "جاري تحميل المحتوى المشارك...",
            linkValidated: "تم التحقق من الرابط بنجاح!",
            readyToOpen: "جاهز للفتح!",
            openingApp: "جاري فتح تطبيق كيبل...",
            redirectingStore: "جاري التوجيه إلى متجر التطبيقات...",
            clickToContinue: "اضغط على 'فتح تطبيق كيبل' للمتابعة",
            chooseContinue: "اختر كيفية المتابعة",
            linkDeactivated: "تم إلغاء تفعيل هذا الرابط المشارك.",
            linkExpired: "انتهت صلاحية هذا الرابط المشارك.",
            usageLimitReached: "وصل هذا الرابط المشارك إلى حد الاستخدام المسموح.",
            linkNotFound: "لم يتم العثور على هذا الرابط المشارك أو انتهت صلاحيته.",
            unableToLoad: "تعذر تحميل المحتوى المشارك. يرجى المحاولة مرة أخرى.",
            unableToValidate: "تعذر التحقق من الرابط",
            linkValidationFailed: "فشل في التحقق من الرابط",
            unableToOpen: "تعذر فتح التطبيق. جرب تحميله أولاً.",
            didntOpenRedirect: "إذا لم يتم فتح التطبيق، سنوجهك لتحميله...",
            couldntOpenInstall: "تعذر فتح التطبيق. دعنا نحصل عليه مثبتاً!",
            welcomeBack: "مرحباً بعودتك! جرب فتح التطبيق مرة أخرى.",
            chargingStation: "🔌 محطة شحن",
            userProfile: "👤 الملف الشخصي",
            specialOffer: "🎁 عرض خاص",
            routePlan: "🗺️ خطة الطريق",
            sharedContent: "📱 محتوى مشارك",
            defaultDescription: 'اضغط على "فتح تطبيق كيبل" لعرض هذا المحتوى.'
        }
    };

    // Get language from URL parameter or default to Arabic
    function detectLanguage() {
        const urlParams = new URLSearchParams(window.location.search);
        const langParam = urlParams.get('lang');
        
        if (langParam && (langParam === 'en' || langParam === 'ar')) {
            return langParam;
        }
        
        return 'ar'; // Default to Arabic for existing links
    }

    // Apply language to the page
    function applyLanguage(lang) {
        currentLanguage = lang;
        const body = document.body;
        
        // Set RTL/LTR and language classes
        if (lang === 'ar') {
            body.classList.add('rtl', 'arabic');
            body.classList.remove('ltr');
            document.documentElement.lang = 'ar';
            document.getElementById('langToggle').textContent = 'English';
        } else {
            body.classList.add('ltr');
            body.classList.remove('rtl', 'arabic');
            document.documentElement.lang = 'en';
            document.getElementById('langToggle').textContent = 'عربي';
        }
        
        // Update all translatable elements
        document.querySelectorAll('[data-en][data-ar]').forEach(element => {
            const key = lang === 'ar' ? 'data-ar' : 'data-en';
            element.textContent = element.getAttribute(key);
        });
    }

    // Toggle language function
    function toggleLanguage() {
        const newLang = currentLanguage === 'ar' ? 'en' : 'ar';
        applyLanguage(newLang);
        
        // Update URL without reload
        const url = new URL(window.location);
        url.searchParams.set('lang', newLang);
        window.history.replaceState({}, '', url);
    }

    // Get translation helper
    function t(key) {
        return translations[currentLanguage][key] || key;
    }

    // Extract token from URL
    function getTokenFromUrl() {
        const pathParts = window.location.pathname.split("/");
        return pathParts[pathParts.length - 1];
    }

    // Update status message
    function updateStatus(messageKey, type = "default") {
        const statusEl = document.getElementById("status");
        const message = translations[currentLanguage][messageKey] || messageKey;
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
    }

    // Show link information (simplified - no UI display)
    function showLinkInfo(data) {
        // Link info is hidden in UI, just store data for reference
        // This function kept for compatibility but doesn't show UI elements
    }

    // Get content title based on link type
    function getContentTitle(data) {
        switch (data.linkType) {
            case "CHARGING_POINT":
                return t("chargingStation");
            case "USER_PROFILE":
                return t("userProfile");
            case "PROMOTION":
                return t("specialOffer");
            case "ROUTE_PLAN":
                return t("routePlan");
            default:
                return t("sharedContent");
        }
    }

    // Start countdown timer for auto-redirect
    function startCountdown(seconds = 3) {
        if (redirectCancelled) return;
        
        const countdownContainer = document.getElementById("countdownContainer");
        const countdownNumber = document.getElementById("countdownNumber");
        const progressCircle = document.getElementById("progressCircle");
        
        countdownContainer.style.display = "block";
        countdownContainer.classList.add("fade-in");
        
        let currentCount = seconds;
        const totalCircumference = 314; // 2 * π * r (r=50)
        
        countdownNumber.textContent = currentCount;
        
        countdownTimer = setInterval(() => {
            currentCount--;
            countdownNumber.textContent = currentCount;
            
            // Update progress circle
            const progress = ((seconds - currentCount) / seconds) * totalCircumference;
            progressCircle.style.strokeDashoffset = totalCircumference - progress;
            
            if (currentCount <= 0) {
                clearInterval(countdownTimer);
                if (!redirectCancelled) {
                    openApp();
                }
            }
        }, 1000);
    }

    // Cancel redirect function (removed from UI but kept for compatibility)
    function cancelRedirect() {
        // Function removed from UI but kept to avoid JavaScript errors
    }

    // Show manual buttons with animation
    function showManualButtons() {
        const actionButtons = document.getElementById("actionButtons");
        actionButtons.classList.remove("hide");
        actionButtons.classList.add("fade-in");
    }

    // Show buttons on redirect failure
    function showButtonsOnFailure(message, type = "error") {
        redirectCancelled = true;
        if (countdownTimer) {
            clearInterval(countdownTimer);
        }
        
        document.getElementById("countdownContainer").style.display = "none";
        updateStatus(message, type);
        showManualButtons();
    }

    // Main function to handle shared link
    async function handleSharedLink() {
        try {
            const token = getTokenFromUrl();

            if (!token || token === "shared") {
                throw new Error("Invalid or missing token");
            }

            deviceInfo = getDeviceInfo();
            const ipAddress = await getIpAddress();

            updateStatus("loadingContent");

            // First, get the link details (without consuming usage)
            const response = await fetch(
                `${CONFIG.API_BASE_URL}/api/shared-links/get/${token}`
            );

            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error(t("linkNotFound"));
                }
                throw new Error(t("unableToLoad"));
            }

            linkData = await response.json();

            // Hide loader and show content
            document.getElementById("loader").style.display = "none";
            showLinkInfo(linkData);

            // Check if link is still valid
            if (!linkData.isActive) {
                showButtonsOnFailure("linkDeactivated", "error");
                return;
            }

            if (
                linkData.expiresAt &&
                new Date(linkData.expiresAt) <= new Date()
            ) {
                showButtonsOnFailure("linkExpired", "error");
                return;
            }

            if (linkData.currentUsage >= linkData.maxUsage) {
                showButtonsOnFailure("usageLimitReached", "error");
                return;
            }

            updateStatus("linkValidated", "success");

            // Auto-redirect behavior
            if (isMobile) {
                // Start beautiful countdown for mobile
                startCountdown(3);
            } else {
                // Desktop: Show manual buttons immediately
                showManualButtons();
                updateStatus("clickToContinue", "success");
            }
        } catch (error) {
            console.error("Error handling shared link:", error);
            document.getElementById("loader").style.display = "none";
            showButtonsOnFailure(error.message, "error");
        }
    }

    // Open app function
    async function openApp() {
        if (!linkData) {
            downloadApp();
            return;
        }

        try {
            // Hide countdown if visible
            document.getElementById("countdownContainer").style.display = "none";
            updateStatus("openingApp", "success");

            // Validate and consume the link
            const ipAddress = await getIpAddress();
            const validateResponse = await fetch(
                `${CONFIG.API_BASE_URL}/api/shared-links/validate/${
                    linkData.linkToken
                }?deviceInfo=${encodeURIComponent(
                    JSON.stringify(deviceInfo)
                )}&ipAddress=${ipAddress}`
            );

            if (!validateResponse.ok) {
                throw new Error(t("unableToValidate"));
            }

            const validationResult = await validateResponse.json();

            if (!validationResult.isValid) {
                showButtonsOnFailure(
                    validationResult.errorMessage || "linkValidationFailed",
                    "error"
                );
                return;
            }

            // Build deep link
            const deepLink = `${linkData.baseUrl}?token=${
                linkData.linkToken
            }&targetId=${linkData.targetId || ""}`;

            console.log("Attempting to open deep link:", deepLink);

            // Try to open the app
            window.location.href = deepLink;

            // Show fallback timer for mobile
            if (isMobile) {
                updateStatus("didntOpenRedirect", "warning");
                setTimeout(() => {
                    if (!document.hidden) {
                        // User is still on the page, app didn't open
                        showButtonsOnFailure("couldntOpenInstall", "warning");
                    }
                }, 3000);
            } else {
                // Desktop fallback
                setTimeout(() => {
                    downloadApp();
                }, 2000);
            }
        } catch (error) {
            console.error("Error opening app:", error);
            showButtonsOnFailure(
                "unableToOpen",
                "warning"
            );
        }
    }

    // Download app function
    function downloadApp() {
        updateStatus("redirectingStore", "warning");

        setTimeout(() => {
            if (isAndroid) {
                window.location.href = `https://play.google.com/store/apps/details?id=${CONFIG.ANDROID_PACKAGE}`;
            } else if (isIOS) {
                window.location.href = `https://apps.apple.com/app/cable-ev-charging/${CONFIG.IOS_APP_ID}`;
            } else {
                // Desktop - redirect to web version
                window.location.href = `${CONFIG.WEB_FALLBACK}/charging-point/${
                    linkData?.targetId || ""
                }`;
            }
        }, 1000);
    }

    // Initialize when page loads
    document.addEventListener("DOMContentLoaded", function () {
        // Detect and apply language first
        const detectedLang = detectLanguage();
        applyLanguage(detectedLang);
        
        // Then handle shared link
        handleSharedLink();
    });

    // Handle page visibility changes (when user returns from app store)
    document.addEventListener("visibilitychange", function () {
        if (!document.hidden && linkData && redirectCancelled) {
            // User returned to page, maybe they installed the app
            updateStatus("welcomeBack", "success");
